<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FlowExpense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card glassmorphism">
            <div class="brand auth-brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="brand-text">
                    <h1>FlowExpense</h1>
                    <p>Welcome back — sign in to continue</p>
                </div>
            </div>

            <div class="auth-tabs">
                <a href="{{ url_for('login') }}" class="auth-tab active">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </a>
                <a href="{{ url_for('register') }}" class="auth-tab">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </a>
            </div>

            {% if error %}
            <div class="auth-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="expense-form auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Your username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="password" name="password" placeholder="Your password" autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <p class="auth-switch">
                New to FlowExpense? <a href="{{ url_for('register') }}">Create an account</a>
            </p>

            <div class="demo-logins">
                <span>Admin: admin / admin123</span>
                <span>User: user / user123</span>
            </div>
        </section>
    </main>
</body>
</html>
