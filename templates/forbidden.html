<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied - FlowExpense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card glassmorphism">
            <div class="access-denied-icon">
                <i class="fa-solid fa-lock"></i>
            </div>
            <div class="auth-copy">
                <h1>Admin access required</h1>
                <p>Your account can use the user portal, but this page is reserved for admins.</p>
            </div>
            <div class="auth-actions">
                <a href="{{ url_for('user_page') }}" class="btn btn-primary">
                    <i class="fa-solid fa-table-columns"></i> User Portal
                </a>
                <a href="{{ url_for('logout') }}" class="btn btn-secondary">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </a>
            </div>
        </section>
    </main>
</body>
</html>
