<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FlowExpense</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="auth-card glassmorphism">
            <div class="brand auth-brand">
                <div class="brand-icon">
                    <i class="fa-solid fa-wallet"></i>
                </div>
                <div class="brand-text">
                    <h1>FlowExpense</h1>
                    <p>Create your account in seconds</p>
                </div>
            </div>

            <div class="auth-tabs">
                <a href="{{ url_for('login') }}" class="auth-tab">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </a>
                <a href="{{ url_for('register') }}" class="auth-tab active">
                    <i class="fa-solid fa-user-plus"></i> Sign Up
                </a>
            </div>

            {% if error %}
            <div class="auth-error">
                <i class="fa-solid fa-circle-exclamation"></i>
                {{ error }}
            </div>
            {% endif %}

            <form method="post" class="expense-form auth-form">
                <div class="form-group">
                    <label>Account Type</label>
                    <div class="role-picker">
                        <label class="role-option">
                            <input type="radio" name="role" value="user" checked>
                            <span class="role-option-body">
                                <i class="fa-solid fa-user"></i>
                                <strong>User</strong>
                                <small>Record &amp; review expenses</small>
                            </span>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="admin">
                            <span class="role-option-body">
                                <i class="fa-solid fa-user-shield"></i>
                                <strong>Admin</strong>
                                <small>Full access &amp; delete</small>
                            </span>
                        </label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Choose a username" autocomplete="username" minlength="3" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key"></i>
                        <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" minlength="6" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-shield-halved"></i>
                        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat your password" autocomplete="new-password" minlength="6" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fa-solid fa-user-plus"></i> Create Account
                </button>
            </form>

            <p class="auth-switch">
                Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
            </p>
        </section>
    </main>
</body>
</html>
